<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a8e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top red stripe -->
  <rect width="1200" height="8" fill="#EE161F"/>
  <!-- Bottom red stripe -->
  <rect y="622" width="1200" height="8" fill="#EE161F"/>
  <!-- Lebanese flag icon -->
  <g transform="translate(600,180)">
    <rect x="-50" y="-50" width="100" height="100" rx="16" fill="#FFFFFF"/>
    <rect x="-50" y="-50" width="100" height="32" rx="16" fill="#EE161F"/>
    <rect x="-50" y="-44" width="100" height="12" fill="#EE161F"/>
    <rect x="-50" y="18" width="100" height="32" rx="16" fill="#EE161F"/>
    <rect x="-50" y="18" width="100" height="12" fill="#EE161F"/>
    <rect x="-50" y="-18" width="100" height="36" fill="#FFFFFF"/>
    <g transform="translate(0,-5)">
      <polygon points="0,-18 -10,-6 -5,-6 -16,8 -8,8 -20,20 20,20 8,8 16,8 5,-6 10,-6" fill="#00A651"/>
      <rect x="-3" y="20" width="6" height="6" fill="#6B3A1F"/>
    </g>
  </g>
  <!-- Title -->
  <text x="600" y="300" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="56" font-weight="700">Lebanon Relief</text>
  <!-- Arabic title -->
  <text x="600" y="360" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui,sans-serif" font-size="36">إغاثة لبنان</text>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui,sans-serif" font-size="22">Connecting displaced people with volunteers who can help</text>
  <!-- Bottom tagline -->
  <text x="600" y="560" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui,sans-serif" font-size="16">lebanon-crises.vercel.app</text>
</svg>
